    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {

      pointer-events: none;

      flex-wrap: wrap;

      color: var(--mist-gray);

      gap: 16px;
      margin-bottom: 16px;

      position: relative;
      overflow: hidden;

    .notice-card { display: flex; align-items: center; gap: 12px; }

      margin-bottom: 16px;

    .stat-card {

      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(255,255,255,.07), transparent 44%);

    }
    .stat-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; position: relative; }
    .eyebrow { color: var(--mist-gray); font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
